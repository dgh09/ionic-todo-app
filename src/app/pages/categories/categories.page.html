<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="Tareas"></ion-back-button>
    </ion-buttons>
    <ion-title>Categorías</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list *ngIf="categories.length > 0; else emptyState">
    <ion-item-sliding *ngFor="let cat of categories" #sliding>
      <ion-item lines="full">
        <ion-avatar slot="start" [style.background]="cat.color + '22'" class="cat-avatar">
          <ion-icon [name]="cat.icon" [style.color]="cat.color" size="small"></ion-icon>
        </ion-avatar>
        <ion-label>
          <h2>{{ cat.name }}</h2>
          <ion-note>{{ taskCountMap[cat.id] ?? 0 }} tarea(s)</ion-note>
        </ion-label>
        <div slot="end" class="color-dot-sm" [style.background]="cat.color"></div>
      </ion-item>

      <ion-item-options side="start">
        <ion-item-option color="primary" (click)="openEditCategory(cat, sliding)">
          <ion-icon slot="icon-only" name="create"></ion-icon>
        </ion-item-option>
      </ion-item-options>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="confirmDelete(cat, sliding)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ng-template #emptyState>
    <div class="empty-state">
      <ion-icon name="folder-open" color="medium"></ion-icon>
      <h3>Sin categorías</h3>
      <p>Crea categorías para organizar mejor tus tareas</p>
    </div>
  </ng-template>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="openAddCategory()" color="primary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
