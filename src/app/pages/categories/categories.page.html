<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <div class="header-content">
      <button class="header-back-btn" (click)="goBack()">
        <ion-icon name="arrow-back"></ion-icon>
      </button>
      <h1 class="header-title">Categorías</h1>
      <div class="header-spacer"></div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div class="cat-list" *ngIf="categories.length > 0; else emptyState">
    <div class="cat-card" *ngFor="let cat of categories">

      <div class="cat-icon-wrap" [style.background]="cat.color + '22'">
        <ion-icon [name]="cat.icon" [style.color]="cat.color"></ion-icon>
      </div>

      <div class="cat-info">
        <div class="cat-name-row">
          <p class="cat-name">{{ cat.name }}</p>
          <span class="cat-shopping-badge" *ngIf="isShoppingCategory(cat)">
            <ion-icon name="cart"></ion-icon>
          </span>
        </div>
        <p class="cat-count">{{ taskCountMap[cat.id] ?? 0 }} tarea(s)</p>
      </div>

      <div class="cat-actions">
        <button class="cat-action-btn edit-btn" (click)="openEditCategory(cat)">
          <ion-icon name="create-outline"></ion-icon>
        </button>
        <button class="cat-action-btn delete-btn" (click)="confirmDelete(cat)">
          <ion-icon name="trash-outline"></ion-icon>
        </button>
      </div>

    </div>
  </div>

  <ng-template #emptyState>
    <div class="empty-state">
      <div class="empty-illustration">
        <ion-icon name="folder-open"></ion-icon>
      </div>
      <h3>Sin categorías</h3>
      <p>Toca <strong>+</strong> para crear tu primera categoría</p>
    </div>
  </ng-template>

  <button class="fab-btn" (click)="openAddCategory()">
    <ion-icon name="add"></ion-icon>
  </button>

</ion-content>
