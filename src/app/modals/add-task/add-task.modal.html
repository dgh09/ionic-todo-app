<ion-content>
  <div class="atm-wrap">

    <div class="atm-handle"></div>

    <div class="atm-header">
      <h2 class="atm-title">{{ task ? 'Editar tarea' : 'Nueva tarea' }}</h2>
      <button class="atm-close" (click)="cancel()">
        <ion-icon name="close"></ion-icon>
      </button>
    </div>

    <div class="atm-field">
      <input
        class="atm-input"
        [(ngModel)]="title"
        placeholder="¿Qué necesitas hacer?"
        maxlength="100"
        autofocus
      />
    </div>

    <div class="atm-field">
      <textarea
        class="atm-textarea"
        [(ngModel)]="description"
        placeholder="Añade una descripción..."
        maxlength="500"
        rows="2"
      ></textarea>
    </div>

    <p class="atm-label">Categoría</p>
    <div class="atm-cats">
      <button
        class="atm-cat-pill"
        [class.atm-cat-active]="categoryId === null"
        (click)="categoryId = null"
      >Sin categoría</button>
      <button
        *ngFor="let cat of categories; trackBy: trackByCategoryId"
        class="atm-cat-pill"
        [class.atm-cat-active]="categoryId === cat.id"
        [style.--cat-color]="cat.color"
        [style.--cat-bg]="cat.color + '22'"
        (click)="categoryId = cat.id"
      >
        <ion-icon [name]="cat.icon"></ion-icon>
        {{ cat.name }}
      </button>
    </div>

    <ng-container *ngIf="isShoppingSelected">
      <p class="atm-label">Precio estimado (COP)</p>
      <div class="atm-field atm-price-field">
        <span class="atm-price-prefix">$</span>
        <input
          class="atm-input atm-price-input"
          type="text"
          inputmode="numeric"
          [value]="priceDisplay"
          (input)="onPriceInput($event)"
          placeholder="0"
        />
      </div>
    </ng-container>

    <ng-container *ngIf="showPriority">
      <p class="atm-label">Prioridad</p>
      <div class="atm-priority">
        <button class="atm-pri-btn pri-low"    [class.atm-pri-active]="priority === 'low'"    (click)="priority = 'low'">
          <span class="atm-dot"></span> Baja
        </button>
        <button class="atm-pri-btn pri-medium" [class.atm-pri-active]="priority === 'medium'" (click)="priority = 'medium'">
          <span class="atm-dot"></span> Media
        </button>
        <button class="atm-pri-btn pri-high"   [class.atm-pri-active]="priority === 'high'"   (click)="priority = 'high'">
          <span class="atm-dot"></span> Alta
        </button>
      </div>
    </ng-container>

    <button
      class="atm-submit"
      [class.atm-disabled]="!isValid"
      (click)="confirm()"
    >
      <ion-icon [name]="task ? 'checkmark' : 'add'"></ion-icon>
      {{ task ? 'Guardar cambios' : 'Agregar tarea' }}
    </button>

  </div>
</ion-content>
