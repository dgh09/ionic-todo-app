<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ task ? 'Editar Tarea' : 'Nueva Tarea' }}</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancelar</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button (click)="confirm()" [disabled]="!isValid" strong>
        {{ task ? 'Guardar' : 'Agregar' }}
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list lines="full">
    <ion-item>
      <ion-label position="stacked">Título *</ion-label>
      <ion-input
        [(ngModel)]="title"
        placeholder="¿Qué necesitas hacer?"
        maxlength="100"
        autofocus
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Descripción</ion-label>
      <ion-textarea
        [(ngModel)]="description"
        placeholder="Detalles opcionales..."
        rows="3"
        maxlength="500"
      ></ion-textarea>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Categoría</ion-label>
      <ion-select [(ngModel)]="categoryId" placeholder="Sin categoría" interface="action-sheet">
        <ion-select-option [value]="null">Sin categoría</ion-select-option>
        <ion-select-option *ngFor="let cat of categories" [value]="cat.id">
          {{ cat.name }}
        </ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item *ngIf="showPriority">
      <ion-label position="stacked">Prioridad</ion-label>
      <ion-select [(ngModel)]="priority" interface="action-sheet">
        <ion-select-option value="low">Baja</ion-select-option>
        <ion-select-option value="medium">Media</ion-select-option>
        <ion-select-option value="high">Alta</ion-select-option>
      </ion-select>
    </ion-item>
  </ion-list>
</ion-content>
